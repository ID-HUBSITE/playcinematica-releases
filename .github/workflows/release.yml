name: Auto Create Release

on:
  push:
    branches:
      - main
    paths:
      - 'version.json'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Parse version.json
        id: parse_version
        run: |
          VERSION=$(jq -r '.latestVersion' version.json)
          NOTES=$(jq -r '.releaseNotes' version.json)
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
          echo "notes=$NOTES" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.parse_version.outputs.version }}
          name: ${{ steps.parse_version.outputs.version }}
          body: ${{ steps.parse_version.outputs.notes }}
          draft: false
          prerelease: false
          files: app-release-optimized.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
